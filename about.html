<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Official Website</title>

    <!-- favicons -->
    <link rel="shortcut icon" href="./assests/images/logo.jpg" type="image/x-icon">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="./assests/css/bootstrap.min.css">

    <!-- CDN for Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./assests/css/style.css">
</head>

<body>

    <!-- start of header -->
    <header class="bg-info-subtle px-5">
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand" href="./index.html">
                    <img src="./assests/images/logo.jpg" alt="Ecommerce" width="50" height="50" class="rounded-circle shadow">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll" aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarScroll">
                <ul class="navbar-nav m-auto my-2 my-lg-0 navbar-nav-scroll">
                    <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="./index.html">Home</a>
                    </li>

                    <li class="nav-item">
                    <a class="nav-link" href="./products.html">Products</a>
                    </li>

                    <li class="nav-item">
                    <a class="nav-link" href="./cart.html">Carts</a>
                    </li>

                    <li class="nav-item">
                    <a class="nav-link" href="./about.html">About</a>
                    </li>

                    <li class="nav-item">
                    <a class="nav-link" href="./contact.html">Contact</a>
                    </li>
                    
                </ul>
                <div class="d-flex">
                    <a href="register.html" class="btn btn-dark btn-sm me-2">Register</a>
                    <a href="login.html" class="btn btn-light btn-sm px-3">Login</a>
                </div>
                </div>
            </div>
            </nav>
    </header>
    <!-- end of header -->


    <!-- start of main  -->
    <main>

        <!-- start of banner -->
        <div class="banner" id="banner">
            <div id="carouselExampleAutoplaying" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                    <img src="./assests/images/b1.jpg" class="d-block w-100" alt="Banner Image">
                    </div>
                    <div class="carousel-item">
                    <img src="./assests/images/b2.jpg" class="d-block w-100" alt="Banner Image">
                    </div>
                    <div class="carousel-item">
                    <img src="./assests/images/b3.jpg" class="d-block w-100" alt="Banner Image">
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </div>
         <!-- end of banner -->

    </main>
    <!-- end of main  -->


    <!-- start of footer -->
    <footer>
        <div class="d-flex p-4 justify-content-between">
            <div class="col-md-3"></div>
            <div class="col-md-2"></div>
            <div class="col-md-2"></div>
            <div class="col-md-2"></div>
        </div>
    </footer>
    <!-- end of footer -->




    <!-- Bootstrap Script -->
    <script src="./assests/js/bootstrap.bundle.min.js"></script>
</body>

</html>
